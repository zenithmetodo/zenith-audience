<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5CF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B845FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E5CF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B845FF;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="480" height="120" fill="#050510"/>

  <!-- Z símbolo en rombo -->
  <g transform="translate(20,20)">
    <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#g1)" filter="url(#glow)"/>
    <text x="40" y="58" font-family="Georgia, serif" font-size="48" font-weight="800" fill="#050510" text-anchor="middle">Z</text>
  </g>

  <!-- Texto Zenith Audience -->
  <text x="120" y="55" font-family="Georgia, serif" font-size="32" font-weight="700" fill="url(#g2)">Zenith Audience</text>
  <text x="120" y="78" font-family="'Inter', sans-serif" font-size="11" fill="#8089a0" letter-spacing="2">SISTEMA DIARIO DE CONTENIDO VIRAL</text>

  <!-- Decorative line -->
  <line x1="120" y1="92" x2="280" y2="92" stroke="url(#g2)" stroke-width="2" opacity="0.5"/>
  <text x="120" y="108" font-family="'Inter', sans-serif" font-size="10" fill="#6b7588">JOSEPH MORENO · BASADO EN MÉTODO AUDIENCE DE ELIAS MAMÃ</text>
</svg>
