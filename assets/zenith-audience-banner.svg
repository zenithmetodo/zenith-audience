<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#050510;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0a18;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5CF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B845FF;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="glowCenter" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00E5CF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#050510;stop-opacity:0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Glow centro -->
  <ellipse cx="640" cy="320" rx="500" ry="300" fill="url(#glowCenter)"/>

  <!-- Decoraciones líneas diagonales -->
  <g opacity="0.05" stroke="url(#brandGrad)" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="500" />
    <line x1="0" y1="200" x2="1280" y2="600" />
    <line x1="0" y1="300" x2="1280" y2="700" />
  </g>

  <!-- Círculos decorativos -->
  <g opacity="0.1">
    <circle cx="100" cy="100" r="60" fill="none" stroke="#00E5CF" stroke-width="2"/>
    <circle cx="1180" cy="540" r="80" fill="none" stroke="#B845FF" stroke-width="2"/>
    <circle cx="1100" cy="120" r="40" fill="#00E5CF"/>
    <circle cx="200" cy="500" r="30" fill="#B845FF"/>
  </g>

  <!-- Logo Z grande -->
  <g transform="translate(140,200)">
    <rect x="0" y="0" width="160" height="160" rx="32" fill="url(#brandGrad)" filter="url(#glow2)"/>
    <rect x="0" y="0" width="160" height="160" rx="32" fill="url(#brandGrad)"/>
    <text x="80" y="118" font-family="Georgia, serif" font-size="100" font-weight="800" fill="#050510" text-anchor="middle">Z</text>
  </g>

  <!-- Texto principal -->
  <text x="350" y="270" font-family="Georgia, serif" font-size="72" font-weight="700" fill="url(#brandGrad)">Zenith Audience</text>
  <text x="350" y="320" font-family="Georgia, serif" font-style="italic" font-size="28" fill="#e6e8ee">El sistema diario para crear contenido viral</text>
  <text x="350" y="360" font-family="Georgia, serif" font-style="italic" font-size="28" fill="#e6e8ee">con identidad incopiable</text>

  <!-- Tags -->
  <g transform="translate(350,420)">
    <rect x="0" y="0" width="155" height="36" rx="18" fill="rgba(0,229,207,0.15)" stroke="#00E5CF" stroke-width="1"/>
    <text x="77" y="24" font-family="Inter, sans-serif" font-size="13" fill="#00E5CF" text-anchor="middle" font-weight="600">3 PILARES</text>

    <rect x="170" y="0" width="155" height="36" rx="18" fill="rgba(0,229,207,0.15)" stroke="#00E5CF" stroke-width="1"/>
    <text x="247" y="24" font-family="Inter, sans-serif" font-size="13" fill="#00E5CF" text-anchor="middle" font-weight="600">7 GATILLOS</text>

    <rect x="340" y="0" width="175" height="36" rx="18" fill="rgba(184,69,255,0.15)" stroke="#B845FF" stroke-width="1"/>
    <text x="427" y="24" font-family="Inter, sans-serif" font-size="13" fill="#B845FF" text-anchor="middle" font-weight="600">12 ESTRUCTURAS</text>

    <rect x="530" y="0" width="190" height="36" rx="18" fill="rgba(184,69,255,0.15)" stroke="#B845FF" stroke-width="1"/>
    <text x="625" y="24" font-family="Inter, sans-serif" font-size="13" fill="#B845FF" text-anchor="middle" font-weight="600">8 ELEMENTOS NOTABLE</text>
  </g>

  <!-- Stats grid -->
  <g transform="translate(350,490)" font-family="Inter, sans-serif">
    <text x="0" y="0" font-size="40" font-weight="800" fill="url(#brandGrad)">29</text>
    <text x="0" y="20" font-size="11" fill="#8089a0" letter-spacing="1.5">AGENTES</text>

    <text x="120" y="0" font-size="40" font-weight="800" fill="url(#brandGrad)">15</text>
    <text x="120" y="20" font-size="11" fill="#8089a0" letter-spacing="1.5">COMMANDS</text>

    <text x="260" y="0" font-size="40" font-weight="800" fill="url(#brandGrad)">32</text>
    <text x="260" y="20" font-size="11" fill="#8089a0" letter-spacing="1.5">KNOWLEDGE</text>

    <text x="420" y="0" font-size="40" font-weight="800" fill="url(#brandGrad)">7</text>
    <text x="420" y="20" font-size="11" fill="#8089a0" letter-spacing="1.5">HTML TEMPLATES</text>

    <text x="610" y="0" font-size="40" font-weight="800" fill="url(#brandGrad)">$0</text>
    <text x="610" y="20" font-size="11" fill="#8089a0" letter-spacing="1.5">MÉTRICAS GRATIS</text>
  </g>

  <!-- Footer brand -->
  <text x="640" y="610" font-family="Inter, sans-serif" font-size="13" fill="#6b7588" text-anchor="middle">
    JOSEPH MORENO · ZENITH · BASADO EN EL MÉTODO AUDIENCE DE ELIAS MAMÃ (MARCONI RÔMULO)
  </text>
</svg>
